name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      HAS_E2E_SECRETS: ${{ secrets.SUPABASE_URL_TEST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check text encoding
        run: npm run check:mojibake

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: E2E (harness)
        run: npm run test:e2e:harness

      - name: E2E (app — hybrid)
        if: env.HAS_E2E_SECRETS != ''
        env:
          SUPABASE_URL_TEST: ${{ secrets.SUPABASE_URL_TEST }}
          SUPABASE_PUBLISHABLE_KEY_TEST: ${{ secrets.SUPABASE_PUBLISHABLE_KEY_TEST }}
          SUPABASE_SECRET_KEY_TEST: ${{ secrets.SUPABASE_SECRET_KEY_TEST }}
          E2E_PROVIDER_EMAIL: ${{ secrets.E2E_PROVIDER_EMAIL }}
          E2E_PROVIDER_PASSWORD: ${{ secrets.E2E_PROVIDER_PASSWORD }}
          E2E_PROVIDER_ID: ${{ secrets.E2E_PROVIDER_ID }}
          E2E_LEARNER_EMAIL: ${{ secrets.E2E_LEARNER_EMAIL }}
          E2E_LEARNER_PASSWORD: ${{ secrets.E2E_LEARNER_PASSWORD }}
          E2E_LEARNER_ID: ${{ secrets.E2E_LEARNER_ID }}
        run: |
          npm run seed:e2e
          npm run test:e2e:app

      - name: Build
        run: npm run build

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
